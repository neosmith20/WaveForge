name: Build

on:
  push:
    branches: ["main"]
    paths:
      - "firmware/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "firmware/**"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    # All 8 variants run in parallel; one failure does not cancel the others.
    strategy:
      fail-fast: false
      matrix:
        preset:
          - mduv380
          - mduv380-10w
          - mduv380-ja
          - mduv380-10w-ja
          - dm1701
          - dm1701-ja
          - rt84
          - rt84-ja

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            cmake

      - name: Configure
        working-directory: firmware
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        working-directory: firmware
        run: cmake --build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.preset }}-${{ github.sha }}
          # Upload the distribution binary produced by codec_cleaner (ClearDMR_*.bin).
          # The raw ClearDMR.bin and .hex are included for debugging/flashing.
          path: |
            firmware/build/${{ matrix.preset }}/ClearDMR_*.bin
            firmware/build/${{ matrix.preset }}/ClearDMR.hex
          if-no-files-found: error
          retention-days: 30
